name: Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight
  workflow_dispatch:

jobs:
  check-updates:
    name: Check for updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-dependency-check

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies
        run: |
          cargo outdated --format json > outdated.json || true
          if [ -s outdated.json ]; then
            cat outdated.json
            echo "::warning::Found outdated dependencies"
          else
            echo "All dependencies are up to date"
          fi

      - name: Upload outdated report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: outdated-dependencies
          path: outdated.json

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --json > audit.json

      - name: Parse audit results
        id: audit
        run: |
          if [ -s audit.json ]; then
            VULNS=$(jq '.vulnerabilities.list | length' audit.json)
            echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
            if [ "$VULNS" -gt 0 ]; then
              echo "::error::Found $VULNS vulnerabilities!"
              exit 1
            fi
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-audit
          path: audit.json

  create-pr:
    name: Create PR for updates
    needs: [check-updates, security-audit]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download reports
        uses: actions/download-artifact@v8
        with:
          path: reports

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: update dependencies'
          body: |
            ## Dependency Updates
            
            This PR updates outdated dependencies to their latest versions.
            
            ### Changes
            - Updated outdated Rust dependencies
            - Fixed security vulnerabilities
            
            Please review the changes carefully before merging.
          branch: dependencies/update
          delete-branch: true