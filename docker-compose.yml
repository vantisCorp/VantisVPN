version: '3.8'

services:
  # VANTISVPN Core Service
  vantis-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.core
    container_name: vantis-core
    restart: unless-stopped
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    volumes:
      - ./src:/app/src:ro
      - ./docs:/app/docs:ro
    networks:
      - vantis-network
    ports:
      - "51820:51820/udp"
      - "443:443/tcp"
    healthcheck:
      test: ["CMD", "echo", "healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: vantis-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - vantis-network
    ports:
      - "9090:9090"

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: vantis-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - vantis-network
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Logging - ELK Stack (Elasticsearch)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: vantis-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - vantis-network
    ports:
      - "9200:9200"

  # Logging - ELK Stack (Kibana)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: vantis-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - vantis-network
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  # Service Discovery - Consul
  consul:
    image: consul:latest
    container_name: vantis-consul
    restart: unless-stopped
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - consul-data:/consul/data
    networks:
      - vantis-network
    ports:
      - "8500:8500"
      - "8600:8600/udp"

networks:
  vantis-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  consul-data: